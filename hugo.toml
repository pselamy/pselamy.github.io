baseURL = "https://selamy.dev/"
languageCode = "en-us"
title = "selamy.dev"
theme = "PaperMod"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "Software engineering, automation, and building with AI"
  author = "Patrick Selamy"
  showReadingTime = true
  showShareButtons = true
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true
  showToc = true
  tocOpen = false
  defaultTheme = "auto"
  disableThemeToggle = false

  [params.homeInfoParams]
    Title = "Patrick Selamy"
    Content = "Software engineer in New York. Writing about AI-assisted development, autonomous systems, and the infrastructure that makes them work."

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/patrickselamy/"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/pselamy"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[taxonomies]
  tag = "tags"
  series = "series"
  category = "categories"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "series"
  name = "Series"
  url = "/series/"
  weight = 30

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 40

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    style = "monokai"
    lineNos = false
    codeFences = true
    guessSyntax = true

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
